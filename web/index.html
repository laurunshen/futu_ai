<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Futu Paper AI</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Futu Paper AI</h1>
        <div class="subline">US / HK · SIMULATE</div>
      </div>
      <div class="status-strip" id="statusStrip">
        <span class="status-dot muted"></span>
        <span id="statusText">Checking</span>
      </div>
    </header>

    <nav class="tabbar" aria-label="工作区">
      <button type="button" class="tab-button active" data-tab="overview" aria-selected="true">总览</button>
      <button type="button" class="tab-button" data-tab="market" aria-selected="false">行情</button>
      <button type="button" class="tab-button" data-tab="trade" aria-selected="false">交易</button>
      <button type="button" class="tab-button" data-tab="decisions" aria-selected="false">AI 决策</button>
      <button type="button" class="tab-button" data-tab="news" aria-selected="false">新闻</button>
      <button type="button" class="tab-button" data-tab="debug" aria-selected="false">调试</button>
    </nav>

    <main class="workspace">
      <section class="tab-panel active" data-tab-panel="overview">
        <div class="tab-grid">
          <div class="panel span-7">
            <div class="panel-head">
              <h2>Gemini</h2>
              <span class="pill">AUTO · PAPER</span>
            </div>
            <label class="wide-field">
              消息源
              <textarea id="newsNotes" rows="4" placeholder="可粘贴新闻、公告、社媒摘要；没有就留空"></textarea>
            </label>
            <label class="check-row">
              <input id="aiExecute" type="checkbox" checked>
              <span>允许本次通过风控后自动执行模拟单</span>
            </label>
            <button type="button" class="primary-wide" id="runGemini">Gemini 扫描一次</button>
          </div>

          <div class="panel span-5">
            <div class="panel-head">
              <h2>Gemini 用量</h2>
              <button class="icon-button" id="refreshGeminiUsage" title="刷新用量" aria-label="刷新用量">↻</button>
            </div>
            <div class="usage-grid" id="geminiUsageGrid"></div>
          </div>

          <div class="panel span-12">
            <div class="panel-head">
              <h2>风控</h2>
              <button class="icon-button" id="refreshConfig" title="刷新配置" aria-label="刷新配置">↻</button>
            </div>
            <div class="risk-list" id="riskList"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="market">
        <div class="tab-grid">
          <div class="panel span-5">
            <div class="panel-head">
              <h2>临时行情</h2>
              <button class="icon-button" id="refreshSnapshot" title="刷新行情" aria-label="刷新行情">↻</button>
            </div>
            <div class="input-row">
              <label for="codesInput">代码</label>
              <input id="codesInput" value="US.AAPL,HK.00700" autocomplete="off">
            </div>
            <div class="quote-grid" id="quoteGrid"></div>
          </div>

          <div class="panel span-7">
            <div class="panel-head">
              <h2>自选行情</h2>
              <button class="icon-button" id="refreshMyWatchlist" title="刷新自选" aria-label="刷新自选">↻</button>
            </div>
            <div class="watch-add-row">
              <input id="myWatchCode" placeholder="US.NVDA 或 HK.00700" autocomplete="off">
              <button type="button" class="secondary compact" id="addMyWatch">添加</button>
            </div>
            <div class="watch-grid" id="myWatchGrid"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="trade">
        <div class="tab-grid">
          <div class="panel span-4">
            <div class="panel-head">
              <h2>账户</h2>
              <div class="segmented" role="group" aria-label="账户市场">
                <button class="segment active" data-account-market="US">US</button>
                <button class="segment" data-account-market="HK">HK</button>
              </div>
            </div>
            <div class="metric-grid" id="accountGrid"></div>
          </div>

          <div class="panel span-8">
            <div class="panel-head">
              <h2>订单</h2>
              <div class="segmented" role="group" aria-label="订单方向">
                <button class="segment active" data-side="BUY">BUY</button>
                <button class="segment" data-side="SELL">SELL</button>
              </div>
            </div>

            <form id="orderForm" class="order-form">
              <div class="field-grid">
                <label>
                  代码
                  <input id="orderCode" value="US.AAPL" autocomplete="off">
                </label>
                <label>
                  类型
                  <select id="orderType">
                    <option value="NORMAL">NORMAL</option>
                    <option value="LIMIT">LIMIT</option>
                    <option value="MARKET">MARKET</option>
                  </select>
                </label>
                <label>
                  数量
                  <input id="orderQty" type="number" min="0" step="1" value="1">
                </label>
                <label>
                  价格
                  <input id="orderPrice" type="number" min="0" step="0.01" value="289.65">
                </label>
              </div>
              <label class="wide-field">
                理由
                <input id="orderReason" value="manual paper order" autocomplete="off">
              </label>
              <div class="button-row">
                <button type="button" class="secondary" id="validateOrder">Dry-run</button>
                <button type="button" class="danger" id="executeOrder">执行模拟单</button>
              </div>
            </form>
          </div>

          <div class="panel span-12">
            <div class="panel-head">
              <h2>持仓</h2>
              <button class="icon-button" id="refreshPositions" title="刷新持仓" aria-label="刷新持仓">↻</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>代码</th>
                    <th>数量</th>
                    <th>市值</th>
                    <th>盈亏</th>
                  </tr>
                </thead>
                <tbody id="positionsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="decisions">
        <div class="tab-grid">
          <div class="panel span-7">
            <div class="panel-head">
              <h2>AI 决策</h2>
              <button class="icon-button" id="refreshDecisions" title="刷新决策" aria-label="刷新决策">↻</button>
            </div>
            <div class="decision-tools">
              <input id="decisionStart" type="date" aria-label="开始日期">
              <input id="decisionEnd" type="date" aria-label="结束日期">
              <select id="decisionAction" aria-label="操作类型">
                <option value="ALL">ALL</option>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
                <option value="HOLD">HOLD</option>
              </select>
              <select id="decisionPageSize" aria-label="每页数量">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
            </div>
            <div class="decision-pager">
              <button type="button" class="pager-button" id="prevDecisionPage" aria-label="上一页">‹</button>
              <span id="decisionPageInfo">1 / 1 · 0</span>
              <button type="button" class="pager-button" id="nextDecisionPage" aria-label="下一页">›</button>
            </div>
            <div class="decision-list" id="decisionList"></div>
          </div>

          <aside class="panel span-5 decision-detail-panel">
            <div class="panel-head">
              <h2>详情</h2>
              <span class="detail-status" id="decisionDetailStatus">未选择</span>
            </div>
            <div class="decision-detail-card" id="decisionDetailCard">
              <div class="empty">未选择决策</div>
            </div>
          </aside>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="news">
        <div class="panel">
          <div class="panel-head">
            <h2>新闻信号</h2>
            <button class="icon-button" id="refreshNewsSignals" title="刷新新闻信号" aria-label="刷新新闻信号">↻</button>
          </div>
          <div class="signal-tools">
            <input id="newsSearch" placeholder="搜索标题、代码、主题" autocomplete="off">
            <select id="newsMatch" aria-label="匹配类型">
              <option value="ALL">ALL</option>
              <option value="candidate">候选相关</option>
              <option value="watchlist">自选相关</option>
              <option value="macro">宏观</option>
              <option value="general">普通</option>
            </select>
            <input id="newsMinImpact" type="number" min="0" max="100" step="1" value="0" aria-label="最低影响分">
            <select id="newsPageSize" aria-label="每页新闻数量">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
          <div class="signal-pager">
            <span id="newsSignalSummary">0 / 0</span>
            <button type="button" class="pager-button" id="prevNewsPage" aria-label="上一页">‹</button>
            <span id="newsPageInfo">1 / 1</span>
            <button type="button" class="pager-button" id="nextNewsPage" aria-label="下一页">›</button>
          </div>
          <div class="signal-list" id="newsSignalList"></div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="debug">
        <div class="panel">
          <div class="panel-head">
            <h2>调试输出</h2>
            <button class="icon-button" id="clearOutput" title="清空输出" aria-label="清空输出">×</button>
          </div>
          <pre id="outputBox">{}</pre>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
