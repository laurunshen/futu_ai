<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Futu Paper AI</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Futu Paper AI</h1>
        <div class="subline">US / HK · SIMULATE</div>
      </div>
      <div class="status-strip" id="statusStrip">
        <span class="status-dot muted"></span>
        <span id="statusText">Checking</span>
      </div>
    </header>

    <nav class="tabbar" aria-label="工作区">
      <button type="button" class="tab-button active" data-tab="overview" aria-selected="true">总览</button>
      <button type="button" class="tab-button" data-tab="market" aria-selected="false">行情</button>
      <button type="button" class="tab-button" data-tab="portfolio" aria-selected="false">模拟盘</button>
      <button type="button" class="tab-button" data-tab="chat" aria-selected="false">AI 对话</button>
      <button type="button" class="tab-button" data-tab="decisions" aria-selected="false">AI 决策</button>
      <button type="button" class="tab-button" data-tab="news" aria-selected="false">新闻</button>
      <button type="button" class="tab-button" data-tab="debug" aria-selected="false">调试</button>
    </nav>

    <main class="workspace">
      <section class="tab-panel active" data-tab-panel="overview">
        <div class="tab-grid">
          <div class="panel span-4 overview-account">
            <div class="panel-head">
              <h2>账户</h2>
              <div class="segmented" role="group" aria-label="账户市场">
                <button class="segment active" data-account-market="US">US</button>
                <button class="segment" data-account-market="HK">HK</button>
              </div>
            </div>
            <div class="metric-grid" id="accountGrid"></div>
          </div>

          <div class="panel span-8 overview-gemini">
            <div class="panel-head">
              <h2>Gemini</h2>
              <span class="pill">AUTO · PAPER</span>
            </div>
            <label class="wide-field">
              消息源
              <textarea id="newsNotes" rows="4" placeholder="可粘贴新闻、公告、社媒摘要；没有就留空"></textarea>
            </label>
            <label class="check-row">
              <input id="aiExecute" type="checkbox" checked>
              <span>扫描所有本地模拟盘；当前仅生成建议，不提交订单</span>
            </label>
            <button type="button" class="primary-wide" id="runGemini">Gemini 扫描一次</button>
          </div>

          <div class="panel span-7 overview-order">
            <div class="panel-head">
              <h2>订单</h2>
              <div class="segmented" role="group" aria-label="订单方向">
                <button class="segment active" data-side="BUY">BUY</button>
                <button class="segment" data-side="SELL">SELL</button>
              </div>
            </div>

            <form id="orderForm" class="order-form">
              <div class="field-grid">
                <label>
                  代码
                  <input id="orderCode" value="US.AAPL" autocomplete="off">
                </label>
                <label>
                  类型
                  <select id="orderType">
                    <option value="NORMAL">NORMAL</option>
                    <option value="LIMIT">LIMIT</option>
                    <option value="MARKET">MARKET</option>
                  </select>
                </label>
                <label>
                  数量
                  <input id="orderQty" type="number" min="0" step="1" value="1">
                </label>
                <label>
                  价格
                  <input id="orderPrice" type="number" min="0" step="0.01" value="289.65">
                </label>
              </div>
              <label class="wide-field">
                理由
                <input id="orderReason" value="manual paper order" autocomplete="off">
              </label>
              <div class="button-row">
                <button type="button" class="secondary" id="validateOrder">Dry-run</button>
                <button type="button" class="danger" id="executeOrder">执行模拟单</button>
              </div>
            </form>
          </div>

          <div class="panel span-5 overview-positions">
            <div class="panel-head">
              <h2>持仓</h2>
              <button class="icon-button" id="refreshPositions" title="刷新持仓" aria-label="刷新持仓">↻</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>代码</th>
                    <th>数量</th>
                    <th>市值</th>
                    <th>盈亏</th>
                  </tr>
                </thead>
                <tbody id="positionsBody"></tbody>
              </table>
            </div>
          </div>

          <div class="panel span-12 overview-risk">
            <div class="panel-head">
              <h2>风控</h2>
              <button class="icon-button" id="refreshConfig" title="刷新配置" aria-label="刷新配置">↻</button>
            </div>
            <div class="risk-list" id="riskList"></div>
            <form class="risk-editor" id="riskForm">
              <div class="risk-toggle-grid">
                <label class="check-row">
                  <input id="riskRequireWhitelist" type="checkbox">
                  <span>启用白名单</span>
                </label>
                <label class="check-row">
                  <input id="riskAllowSell" type="checkbox">
                  <span>允许卖出</span>
                </label>
                <label class="check-row">
                  <input id="riskAllowMarketOrders" type="checkbox">
                  <span>允许市价单</span>
                </label>
              </div>
              <div class="wide-field">
                <span>白名单代码</span>
                <div class="risk-code-add">
                  <input id="riskCodeInput" placeholder="US.AAPL 或 HK.00700" autocomplete="off">
                  <button type="button" class="secondary compact" id="addRiskCode">添加</button>
                </div>
                <div class="risk-code-list" id="riskCodeList"></div>
              </div>
              <div class="field-grid">
                <label>
                  US 单笔金额
                  <input id="riskMaxOrderUS" type="number" min="0" step="1">
                </label>
                <label>
                  HK 单笔金额
                  <input id="riskMaxOrderHK" type="number" min="0" step="1">
                </label>
                <label>
                  US 最大数量
                  <input id="riskMaxQtyUS" type="number" min="0" step="1">
                </label>
                <label>
                  HK 最大数量
                  <input id="riskMaxQtyHK" type="number" min="0" step="1">
                </label>
              </div>
              <button type="button" class="primary-wide" id="saveRiskConfig">保存风控</button>
            </form>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="market">
        <div class="tab-grid">
          <div class="panel span-5">
            <div class="panel-head">
              <h2>临时行情</h2>
              <button class="icon-button" id="refreshSnapshot" title="刷新行情" aria-label="刷新行情">↻</button>
            </div>
            <div class="input-row">
              <label for="codesInput">代码</label>
              <input id="codesInput" value="US.AAPL,HK.00700" autocomplete="off">
            </div>
            <div class="quote-grid" id="quoteGrid"></div>
          </div>

          <div class="panel span-7">
            <div class="panel-head">
              <h2>自选行情</h2>
              <button class="icon-button" id="refreshMyWatchlist" title="刷新自选" aria-label="刷新自选">↻</button>
            </div>
            <div class="watch-add-row">
              <input id="myWatchCode" placeholder="US.NVDA 或 HK.00700" autocomplete="off">
              <button type="button" class="secondary compact" id="addMyWatch">添加</button>
            </div>
            <div class="watch-grid" id="myWatchGrid"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="portfolio">
        <div class="tab-grid">
          <aside class="panel span-4">
            <div class="panel-head">
              <h2>模拟盘</h2>
              <button class="icon-button" id="refreshPortfolios" title="刷新模拟盘" aria-label="刷新模拟盘">↻</button>
            </div>
            <div class="portfolio-list" id="portfolioList"></div>
            <div class="portfolio-create">
              <input id="portfolioName" placeholder="新模拟盘名称" autocomplete="off">
              <div class="portfolio-create-grid">
                <select id="portfolioCurrency" aria-label="基础币种">
                  <option value="HKD">HKD</option>
                  <option value="USD">USD</option>
                  <option value="CNY">CNY</option>
                </select>
                <input id="portfolioCash" type="number" min="0" step="1" value="0" aria-label="现金">
              </div>
              <button type="button" class="secondary compact" id="createPortfolio">新增模拟盘</button>
            </div>
          </aside>

          <div class="panel span-8">
            <div class="panel-head">
              <h2 id="activePortfolioTitle">持仓</h2>
              <span class="detail-status" id="portfolioQuoteStatus">行情待刷新</span>
            </div>
            <div class="portfolio-summary" id="portfolioSummary"></div>
            <form class="position-form" id="portfolioPositionForm">
              <div class="field-grid">
                <label>
                  代码
                  <input id="portfolioPositionCode" placeholder="HK.09988 或 PDD" autocomplete="off">
                </label>
                <label>
                  名称
                  <input id="portfolioPositionName" placeholder="阿里巴巴-W" autocomplete="off">
                </label>
                <label>
                  数量
                  <input id="portfolioPositionQty" type="number" min="0" step="1" value="1">
                </label>
                <label>
                  成本价
                  <input id="portfolioPositionCost" type="number" min="0" step="0.01" value="1">
                </label>
                <label>
                  币种
                  <select id="portfolioPositionCurrency">
                    <option value="HKD">HKD</option>
                    <option value="USD">USD</option>
                    <option value="CNY">CNY</option>
                  </select>
                </label>
                <label>
                  备注
                  <input id="portfolioPositionNote" placeholder="短线波段、真实持仓等" autocomplete="off">
                </label>
              </div>
              <button type="button" class="primary-wide" id="savePortfolioPosition">保存持仓</button>
            </form>
            <form class="position-form trade-form" id="portfolioTradeForm">
              <div class="field-grid">
                <label>
                  操作
                  <select id="portfolioTradeSide">
                    <option value="BUY">买入</option>
                    <option value="SELL">卖出</option>
                  </select>
                </label>
                <label>
                  代码
                  <input id="portfolioTradeCode" placeholder="HK.09988 或 PDD" autocomplete="off">
                </label>
                <label>
                  数量
                  <input id="portfolioTradeQty" type="number" min="0" step="1" value="1">
                </label>
                <label>
                  成交价
                  <input id="portfolioTradePrice" type="number" min="0" step="0.01" value="1">
                </label>
                <label class="span-2">
                  备注
                  <input id="portfolioTradeReason" placeholder="本人券商实际买入/卖出、调仓原因" autocomplete="off">
                </label>
              </div>
              <button type="button" class="secondary primary-wide" id="recordPortfolioTrade">记录本人交易</button>
            </form>
            <div class="portfolio-position-list" id="portfolioPositions"></div>
            <div class="portfolio-activity">
              <div class="panel-head inline-head">
                <h3>操作记录</h3>
              </div>
              <div class="portfolio-operation-list" id="portfolioOperations"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="chat">
        <div class="tab-grid chat-layout">
          <aside class="panel span-4 chat-settings">
            <div class="panel-head">
              <h2>对话设置</h2>
              <span class="pill">PAPER COACH</span>
            </div>
            <label class="wide-field">
              讨论对象
              <input id="chatTopic" placeholder="US.NVDA、HK.00700 或 AI 芯片" autocomplete="off">
            </label>
            <label class="wide-field">
              参考模拟盘
              <select id="chatPortfolio"></select>
            </label>
            <div class="chat-switches">
              <label class="check-row">
                <input id="chatUseNews" type="checkbox" checked>
                <span>使用新闻库</span>
              </label>
              <label class="check-row">
                <input id="chatUseWeb" type="checkbox">
                <span>联网检索</span>
              </label>
            </div>
            <button type="button" class="secondary compact chat-clear" id="clearChat">清空对话</button>
            <div class="chat-note">默认只做模拟盘讨论，不会自动下单。</div>
          </aside>

          <div class="panel span-8 chat-panel">
            <div class="panel-head">
              <h2>AI 对话</h2>
              <span class="detail-status" id="chatStatus">就绪</span>
            </div>
            <div class="chat-thread" id="chatThread">
              <div class="empty">输入一支股票或行业，再问它适不适合模拟买入、卖出或继续观察。</div>
            </div>
            <div class="chat-compose">
              <textarea id="chatInput" rows="3" placeholder="例如：英伟达现在适合模拟买入吗？帮我结合最近新闻拆一下。"></textarea>
              <button type="button" class="primary-wide" id="sendChat">发送</button>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="decisions">
        <div class="tab-grid">
          <div class="panel span-7">
            <div class="panel-head">
              <h2>AI 决策</h2>
              <button class="icon-button" id="refreshDecisions" title="刷新决策" aria-label="刷新决策">↻</button>
            </div>
            <div class="decision-tools">
              <select id="decisionPortfolio" aria-label="模拟盘筛选">
                <option value="ALL">全部模拟盘</option>
              </select>
              <input id="decisionStart" type="date" aria-label="开始日期">
              <input id="decisionEnd" type="date" aria-label="结束日期">
              <select id="decisionAction" aria-label="操作类型">
                <option value="ALL">ALL</option>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
                <option value="HOLD">HOLD</option>
              </select>
              <select id="decisionPageSize" aria-label="每页数量">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
            </div>
            <div class="decision-pager">
              <button type="button" class="pager-button" id="prevDecisionPage" aria-label="上一页">‹</button>
              <span id="decisionPageInfo">1 / 1 · 0</span>
              <button type="button" class="pager-button" id="nextDecisionPage" aria-label="下一页">›</button>
            </div>
            <div class="decision-list" id="decisionList"></div>
          </div>

          <aside class="panel span-5 decision-detail-panel">
            <div class="panel-head">
              <h2>详情</h2>
              <span class="detail-status" id="decisionDetailStatus">未选择</span>
            </div>
            <div class="decision-detail-card" id="decisionDetailCard">
              <div class="empty">未选择决策</div>
            </div>
          </aside>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="news">
        <div class="panel">
          <div class="panel-head">
            <h2>新闻信号</h2>
            <button class="icon-button" id="refreshNewsSignals" title="刷新新闻信号" aria-label="刷新新闻信号">↻</button>
          </div>
          <div class="signal-tools">
            <input id="newsSearch" placeholder="搜索标题、代码、主题" autocomplete="off">
            <select id="newsMatch" aria-label="匹配类型">
              <option value="ALL">ALL</option>
              <option value="candidate">候选相关</option>
              <option value="watchlist">自选相关</option>
              <option value="macro">宏观</option>
              <option value="general">普通</option>
            </select>
            <input id="newsMinImpact" type="number" min="0" max="100" step="1" value="0" aria-label="最低影响分">
            <select id="newsPageSize" aria-label="每页新闻数量">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
          <div class="signal-pager">
            <span id="newsSignalSummary">0 / 0</span>
            <button type="button" class="pager-button" id="prevNewsPage" aria-label="上一页">‹</button>
            <span id="newsPageInfo">1 / 1</span>
            <button type="button" class="pager-button" id="nextNewsPage" aria-label="下一页">›</button>
          </div>
          <div class="signal-list" id="newsSignalList"></div>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="debug">
        <div class="tab-grid">
          <div class="panel span-5">
            <div class="panel-head">
              <h2>Gemini 用量</h2>
              <button class="icon-button" id="refreshGeminiUsage" title="刷新用量" aria-label="刷新用量">↻</button>
            </div>
            <div class="usage-grid" id="geminiUsageGrid"></div>
          </div>

          <div class="panel span-7">
            <div class="panel-head">
              <h2>调试输出</h2>
              <button class="icon-button" id="clearOutput" title="清空输出" aria-label="清空输出">×</button>
            </div>
            <pre id="outputBox">{}</pre>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
